# Continuous integration for Social Media Post Accessibility Checker (Chrome extension).
#
# Action versions were verified against GitHub and pinned to commit SHAs
# on 2026-05-23. The version tag is shown in the trailing comment.
#
# No user-supplied input is interpolated into run steps. All steps use
# fixed strings or npm scripts to prevent command injection.

name: CI
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: lts/*

      - name: Install dependencies (skip postinstall model copy in CI)
        run: npm ci --ignore-scripts

      - name: ESLint
        run: npx eslint src --ext .js,.mjs

      - name: Stylelint
        run: npx stylelint --allow-empty-input "src/**/*.css"

      - name: HTMLHint
        run: npx htmlhint "src/**/*.html"

      - name: Webpack build
        run: npx webpack --config webpack.config.js
