# Continuous integration for the SMACE Chrome extension.
#
# Stack: JavaScript (ES modules), webpack 5 bundled build.
#
# Checks:
#   1. Install dependencies (npm ci).
#   2. Build the extension (npm run build). Confirms the webpack bundle
#      completes without error on every pull request.
#
# Linting (ESLint, HTMLHint, Stylelint) is added here once those tools
# are pinned in devDependencies (Architecture Decision Record 007 requires
# exact version pins before CI can enforce them).
#
# No untrusted GitHub event input is used in any run: step.
#
# Action versions were verified against GitHub and pinned to commit SHAs
# on 2026-05-21. The version tag is in the trailing comment. To update an
# action, change the SHA and the comment together.

name: CI
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Install and build
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build
        # Webpack 5 in production mode. Confirms the bundle compiles without
        # error. Output is written to dist/, which is gitignored.
