# Release automation with release-please. Action SHAs pinned 2026-05-23.
# GITHUB_TOKEN is the built-in Actions token, not user-supplied input.
# No untrusted input is interpolated into run steps in this workflow.

name: Release
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Release Please
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7  # v5.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
