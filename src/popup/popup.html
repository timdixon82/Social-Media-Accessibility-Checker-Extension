<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Social Media Post Accessibility Checker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      width: 300px;
      padding: 16px;
      margin: 0;
      color: #1a1a1a;
      background: #fff;
    }
    h1 { font-size: 15px; margin: 0 0 14px; line-height: 1.3; }

    /* Platform selector */
    fieldset {
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 10px 12px;
      margin: 0 0 14px;
    }
    legend { font-weight: 600; font-size: 13px; padding: 0 4px; }
    .platform-list {
      list-style: none;
      margin: 6px 0 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .platform-list label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }
    .platform-list label.disabled {
      color: #999;
      cursor: not-allowed;
    }
    .platform-list input[type="radio"]:disabled + span {
      color: #999;
    }
    .coming-soon {
      font-size: 11px;
      color: #999;
      font-style: italic;
    }

    /* Current page */
    .field { margin-bottom: 14px; }
    .field-label { display: block; font-weight: 600; font-size: 13px; margin-bottom: 4px; }
    .url-display {
      font-size: 11px;
      color: #555;
      word-break: break-all;
      background: #f4f4f4;
      padding: 5px 7px;
      border-radius: 4px;
    }

    /* Posts range */
    .range-row { display: flex; align-items: center; gap: 8px; }
    .range-row input[type="range"] { flex: 1; }
    .range-val { min-width: 28px; text-align: right; font-weight: 600; font-variant-numeric: tabular-nums; }

    /* Run button */
    button#run-btn {
      width: 100%;
      padding: 9px;
      background: #0a66c2;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    button#run-btn:hover:not(:disabled) { background: #004182; }
    button#run-btn:focus-visible { outline: 3px solid #0a66c2; outline-offset: 2px; }
    button#run-btn:disabled { background: #aaa; cursor: not-allowed; }

    /* Error */
    #error {
      color: #c00;
      font-size: 13px;
      margin-top: 10px;
      display: none;
    }

    /* Version */
    #version {
      font-size: 11px;
      color: #999;
      text-align: right;
      margin-top: 10px;
    }

    /* Focus styles for all interactive elements */
    :focus-visible { outline: 3px solid #0a66c2; outline-offset: 2px; }
  </style>
</head>
<body>
  <h1>Social Media Post Accessibility Checker</h1>

  <fieldset>
    <legend>Platform</legend>
    <ul class="platform-list" role="list">
      <li>
        <label>
          <input type="radio" name="platform" value="linkedin" checked>
          <span>LinkedIn</span>
        </label>
      </li>
      <li>
        <label class="disabled">
          <input type="radio" name="platform" value="twitter" disabled aria-disabled="true">
          <span>X / Twitter <span class="coming-soon">(coming soon)</span></span>
        </label>
      </li>
      <li>
        <label class="disabled">
          <input type="radio" name="platform" value="facebook" disabled aria-disabled="true">
          <span>Facebook <span class="coming-soon">(coming soon)</span></span>
        </label>
      </li>
      <li>
        <label class="disabled">
          <input type="radio" name="platform" value="instagram" disabled aria-disabled="true">
          <span>Instagram <span class="coming-soon">(coming soon)</span></span>
        </label>
      </li>
    </ul>
  </fieldset>

  <div class="field">
    <span class="field-label" id="url-label">Current page</span>
    <div class="url-display" id="current-url" aria-labelledby="url-label" role="status">Detecting...</div>
  </div>

  <div class="field">
    <label class="field-label" for="posts-range">Posts to audit</label>
    <div class="range-row">
      <input
        type="range"
        id="posts-range"
        min="1" max="50" value="10" step="1"
        aria-valuemin="1" aria-valuemax="50" aria-valuenow="10"
        aria-valuetext="10 posts"
      >
      <span class="range-val" id="posts-val" aria-hidden="true">10</span>
    </div>
  </div>

  <button id="run-btn" type="button">Run Audit</button>
  <div id="error" role="alert" aria-live="assertive"></div>
  <div id="version" aria-label="Extension version"></div>

  <script src="popup.js"></script>
</body>
</html>
